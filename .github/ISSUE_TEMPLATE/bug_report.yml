name: Bug report
description: Report something that is broken or regressed
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.
        If this is a **security vulnerability**, do not use this form — see [SECURITY.md](https://github.com/vietclaw/vietclaw/blob/master/.github/SECURITY.md).

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area is affected?
      options:
        - Agent / chat runtime
        - Web UI
        - CLI
        - Memory
        - Tools (shell, files, web, etc.)
        - Providers / routing
        - Discord channel
        - Telegram channel
        - Harness
        - Config / setup
        - CI / build
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: Describe what you expected vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `vietclaw daemon`
        2. Send message '...'
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / errors
      description: Paste relevant log lines, stack traces, or HTTP responses
      render: shell

  - type: input
    id: version
    attributes:
      label: VietClaw version
      description: Output of `vietclaw version` or git commit if built from source
      placeholder: e.g. 0.1.0 / commit abc123
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I am running a recent commit or release (not an unsupported old version)
          required: false
